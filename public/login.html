<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://code.jquery.com/jquery-2.1.3.min.js"></script>
  <link rel="stylesheet" href="./login.css" />
</head>

<body>
  <div class="wrapper">
    <div class="title-text">
      <div class="title login">Login</div>
      <div class="title signup">Create</div>
    </div>
    <div class="form-container">
      <div class="slide-controls">
        <input type="radio" name="slide" id="login" checked />
        <input type="radio" name="slide" id="signup" />
        <label for="login" class="slide login">Login</label>
        <label for="signup" class="slide signup">Create Account</label>
        <div class="slider-tab"></div>
      </div>
      <div class="form-inner">
        <form action="#" class="login">
          <pre></pre>
          <div class="field">
            <input id="lusername" type="text" placeholder="Username" required />
          </div>
          <div class="field">
            <input id="lpsw" type="password" placeholder="Password" required />
          </div>
          <div class="field btn">
            <div class="btn-layer"></div>
            <input type="button" value="Login" onclick="loginClicked()" />
          </div>
        </form>
        <form action="#" class="signup">
          <div class="field">
            <input id="username" type="text" placeholder="Username" required />
          </div>
          <div class="field">
            <input id="psw" type="password" placeholder="Password" required />
          </div>
          <div class="field btn">
            <div class="btn-layer"></div>
            <input type="button" value="Signup" onclick="signupClicked()" />
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="./login.js"></script>
</body>

</html>
